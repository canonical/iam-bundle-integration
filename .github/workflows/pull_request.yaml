  name: Pull Request

  on:
    pull_request:
      paths:
        - '**.tf'

  jobs:
    build:
      name: Terraform Checks and Plans
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

        - name: HashiCorp - Setup Terraform
          uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0

        - name: Terraform Format
          id: fmt
          run: terraform fmt -recursive -check
          continue-on-error: true

        - name: Terraform Init
          id: init
          run: terraform init

        - name: Terraform Validate
          id: validate
          run: terraform validate -no-color

        - name: Setup Operator Environment
          uses: charmed-kubernetes/actions-operator@d8217ad61c15f746727a9d41563c13e9b9fe56e3 # main
          with:
            juju-channel: 3.6/stable
            provider: microk8s
            channel: 1.32-strict/stable
            microk8s-addons: "dns hostpath-storage metallb:10.64.140.43-10.64.140.49"


        - name: Terraform Plan from the example folders
          id: plan
          run: |
            terraform -chdir=examples/tutorial init -no-color -upgrade
            terraform -chdir=examples/tutorial plan -no-color
            terraform -chdir=examples/admin-ui init -no-color -upgrade
            terraform -chdir=examples/admin-ui plan -no-color

          continue-on-error: true

        - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
          if: github.event_name == 'pull_request'
          env:
            PLAN: "terraform\n${{ steps.plan.outputs.stdout }}"
          with:
            github-token: ${{ secrets.GITHUB_TOKEN }}
            script: |
              // 1. Retrieve existing bot comments for the PR
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              })
              const botComment = comments.find(comment => {
                return comment.user.type === 'Bot' && comment.body.includes('Terraform Format and Style')
              })

              // 2. Prepare format of the comment
              const output = `#### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
              #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
              #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
              <details><summary>Validation Output</summary>

              \`\`\`\n
              ${{ steps.validate.outputs.stdout }}
              \`\`\`

              </details>

              #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

              <details><summary>Show Plan</summary>

              \`\`\`\n
              ${process.env.PLAN}
              \`\`\`

              </details>

              *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Working Directory: \`${{ env.tf_actions_working_dir }}\`, Workflow: \`${{ github.workflow }}\`*`;

              // 3. If we have a comment, update it, otherwise create a new one
              if (botComment) {
                github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body: output
                })
              } else {
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: output
                })
              }

    documentation:
      name: Render Terraform Docs
      needs: build
      uses: ./.github/workflows/documentation.yaml
